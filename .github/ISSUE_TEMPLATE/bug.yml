name: Bug report
description: Report a reproducible issue with symphony-ts
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
        For security vulnerabilities, **do not use this form** — see `SECURITY.md` for private reporting.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal reproduction steps or commands.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: "symphony-ts version or commit SHA."
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, npm version.
    validations:
      required: false